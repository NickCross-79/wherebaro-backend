name: Build and deploy Node.js Azure Function - wherebaro-function-app

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install deps
      - name: Install dependencies
        run: npm ci

      # Build TypeScript
      - name: Build
        run: npm run build

      # Remove dev deps
      - name: Prune
        run: npm prune --production

      # Prepare deployment package
      - name: Prepare deployment folder
        run: |
          mkdir -p ./deploy
          cp host.json package.json package-lock.json tsconfig.json ./deploy/ 
          cp -r dist ./deploy/
          cp dist/src/functions/index.js ./deploy/index.js

      # Build in root project folder
      - name: Build in root
        run: npm run build

      # Prepare deployment folder
      - name: Prepare deployment folder
        run: |
          mkdir -p ./deploy
          cp host.json package.json package-lock.json ./deploy/
          cp -r dist ./deploy/
          cp dist/src/functions/index.js ./deploy/index.js

      # Install production dependencies in deploy folder
      - name: Install production dependencies
        run: |
          cd ./deploy
          npm install --production

      # List deploy folder contents for verification
      - name: List deploy folder contents
        run: |
          echo "Deploy folder structure:" && tree ./deploy || ls -R ./deploy
      # Deploy 
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: wherebaro-function-app
          package: ./deploy
          respect-funcignore: true
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C176C977065E4DE5B174105C67537BEA }}